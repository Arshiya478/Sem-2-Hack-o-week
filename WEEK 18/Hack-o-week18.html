<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NEXUS File Explorer</title>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:       #050810;
    --panel:    #0a0f1e;
    --border:   #1a2a4a;
    --accent:   #00d4ff;
    --accent2:  #7b2fff;
    --green:    #00ff88;
    --warn:     #ff6b35;
    --text:     #c8deff;
    --muted:    #4a6080;
    --folder:   #ffd166;
    --file:     #06d6a0;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Share Tech Mono', monospace;
    background: var(--bg);
    color: var(--text);
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    cursor: default;
  }

  /* Scanline overlay */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 2px,
      rgba(0,212,255,0.015) 2px,
      rgba(0,212,255,0.015) 4px
    );
    pointer-events: none;
    z-index: 9999;
  }

  /* CRT flicker */
  @keyframes flicker {
    0%,100% { opacity: 1; }
    92% { opacity: 1; }
    93% { opacity: 0.96; }
    94% { opacity: 1; }
    96% { opacity: 0.98; }
  }
  body { animation: flicker 8s infinite; }

  /* ── TOP BAR ── */
  .topbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 20px;
    background: var(--panel);
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }
  .logo {
    font-family: 'Orbitron', monospace;
    font-weight: 900;
    font-size: 18px;
    letter-spacing: 4px;
    color: var(--accent);
    text-shadow: 0 0 20px var(--accent), 0 0 40px rgba(0,212,255,0.3);
  }
  .logo span { color: var(--accent2); }
  .sys-info {
    display: flex;
    gap: 20px;
    font-size: 11px;
    color: var(--muted);
  }
  .sys-info span { color: var(--green); }
  .dot-row { display: flex; gap: 6px; }
  .dot { width: 12px; height: 12px; border-radius: 50%; cursor: pointer; transition: filter 0.2s; }
  .dot:hover { filter: brightness(1.5); }
  .dot.r { background: #ff5f57; }
  .dot.y { background: #febc2e; }
  .dot.g { background: #28c840; }

  /* ── LAYOUT ── */
  .layout {
    display: flex;
    flex: 1;
    overflow: hidden;
  }

  /* ── SIDEBAR ── */
  .sidebar {
    width: 240px;
    background: var(--panel);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    flex-shrink: 0;
  }
  .sidebar-section {
    padding: 16px;
    border-bottom: 1px solid var(--border);
  }
  .sidebar-label {
    font-family: 'Orbitron', monospace;
    font-size: 9px;
    letter-spacing: 3px;
    color: var(--muted);
    margin-bottom: 12px;
  }
  .inp-wrap {
    position: relative;
    margin-bottom: 8px;
  }
  .inp-wrap::before {
    content: '›';
    position: absolute;
    left: 10px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--accent);
    font-size: 14px;
  }
  input[type="text"] {
    width: 100%;
    padding: 9px 10px 9px 26px;
    background: rgba(0,212,255,0.05);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text);
    font-family: 'Share Tech Mono', monospace;
    font-size: 13px;
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
  }
  input[type="text"]:focus {
    border-color: var(--accent);
    box-shadow: 0 0 12px rgba(0,212,255,0.15);
  }
  input[type="text"]::placeholder { color: var(--muted); }

  /* Type toggle */
  .type-toggle {
    display: flex;
    gap: 6px;
    margin-bottom: 12px;
  }
  .toggle-btn {
    flex: 1;
    padding: 8px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--muted);
    border-radius: 6px;
    cursor: pointer;
    font-family: 'Share Tech Mono', monospace;
    font-size: 12px;
    transition: all 0.2s;
  }
  .toggle-btn.active-folder {
    background: rgba(255,209,102,0.1);
    border-color: var(--folder);
    color: var(--folder);
    text-shadow: 0 0 8px var(--folder);
  }
  .toggle-btn.active-file {
    background: rgba(6,214,160,0.1);
    border-color: var(--file);
    color: var(--file);
    text-shadow: 0 0 8px var(--file);
  }

  /* Action buttons */
  .action-btn {
    width: 100%;
    padding: 9px;
    margin-bottom: 6px;
    border-radius: 6px;
    cursor: pointer;
    font-family: 'Share Tech Mono', monospace;
    font-size: 12px;
    letter-spacing: 1px;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
  }
  .btn-add {
    background: rgba(0,212,255,0.08);
    border: 1px solid rgba(0,212,255,0.4);
    color: var(--accent);
  }
  .btn-add:hover {
    background: rgba(0,212,255,0.18);
    box-shadow: 0 0 16px rgba(0,212,255,0.2);
  }
  .btn-del {
    background: rgba(255,107,53,0.08);
    border: 1px solid rgba(255,107,53,0.4);
    color: var(--warn);
  }
  .btn-del:hover {
    background: rgba(255,107,53,0.18);
    box-shadow: 0 0 16px rgba(255,107,53,0.2);
  }
  .btn-back {
    background: rgba(123,47,255,0.08);
    border: 1px solid rgba(123,47,255,0.4);
    color: var(--accent2);
  }
  .btn-back:hover {
    background: rgba(123,47,255,0.18);
    box-shadow: 0 0 16px rgba(123,47,255,0.2);
  }

  /* Stats panel */
  .stats {
    padding: 16px;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
    margin-top: auto;
    border-top: 1px solid var(--border);
  }
  .stat-box {
    background: rgba(0,212,255,0.03);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 10px;
    text-align: center;
  }
  .stat-num {
    font-family: 'Orbitron', monospace;
    font-size: 18px;
    font-weight: 700;
    color: var(--accent);
    text-shadow: 0 0 12px var(--accent);
  }
  .stat-lbl {
    font-size: 9px;
    color: var(--muted);
    letter-spacing: 1px;
    margin-top: 2px;
  }

  /* ── MAIN ── */
  .main {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* Breadcrumb */
  .breadcrumb {
    padding: 12px 20px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 12px;
    color: var(--muted);
    flex-shrink: 0;
    background: rgba(10,15,30,0.5);
    flex-wrap: wrap;
  }
  .crumb {
    color: var(--accent);
    cursor: pointer;
    transition: text-shadow 0.2s;
    padding: 2px 6px;
    border-radius: 4px;
  }
  .crumb:hover {
    text-shadow: 0 0 10px var(--accent);
    background: rgba(0,212,255,0.08);
  }
  .crumb.active { color: var(--text); cursor: default; }
  .crumb.active:hover { text-shadow: none; background: none; }
  .sep { color: var(--muted); }

  /* View toggles */
  .toolbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 20px;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }
  .view-info { font-size: 11px; color: var(--muted); }
  .view-btns { display: flex; gap: 6px; }
  .view-btn {
    padding: 5px 10px;
    background: transparent;
    border: 1px solid var(--border);
    border-radius: 5px;
    color: var(--muted);
    cursor: pointer;
    font-size: 14px;
    transition: all 0.2s;
  }
  .view-btn.on {
    background: rgba(0,212,255,0.1);
    border-color: var(--accent);
    color: var(--accent);
  }

  /* File grid */
  .grid-wrap {
    flex: 1;
    overflow-y: auto;
    padding: 20px;
    scrollbar-width: thin;
    scrollbar-color: var(--border) transparent;
  }
  .grid-wrap::-webkit-scrollbar { width: 6px; }
  .grid-wrap::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  .grid { display: flex; flex-wrap: wrap; gap: 14px; }
  .list { display: flex; flex-direction: column; gap: 4px; }

  /* Grid item */
  .item {
    width: 110px;
    padding: 16px 10px 12px;
    background: rgba(10,15,30,0.8);
    border: 1px solid var(--border);
    border-radius: 10px;
    text-align: center;
    cursor: pointer;
    transition: all 0.2s;
    position: relative;
    overflow: hidden;
    animation: itemIn 0.25s ease both;
  }
  @keyframes itemIn {
    from { opacity: 0; transform: scale(0.85) translateY(6px); }
    to   { opacity: 1; transform: scale(1) translateY(0); }
  }
  .item::before {
    content: '';
    position: absolute;
    inset: 0;
    opacity: 0;
    transition: opacity 0.2s;
    border-radius: 10px;
  }
  .item.folder-item::before { background: radial-gradient(circle at top, rgba(255,209,102,0.1), transparent 70%); }
  .item.file-item::before   { background: radial-gradient(circle at top, rgba(6,214,160,0.1), transparent 70%); }
  .item:hover { transform: translateY(-4px); border-color: rgba(0,212,255,0.4); box-shadow: 0 8px 24px rgba(0,0,0,0.4); }
  .item:hover::before { opacity: 1; }
  .item.selected { border-color: var(--accent); background: rgba(0,212,255,0.07); }

  .item-icon { font-size: 36px; display: block; margin-bottom: 8px; line-height: 1; }
  .item-name {
    font-size: 11px;
    color: var(--text);
    word-break: break-all;
    line-height: 1.3;
  }
  .item-type-badge {
    position: absolute;
    top: 6px;
    right: 6px;
    font-size: 8px;
    padding: 1px 5px;
    border-radius: 3px;
    letter-spacing: 1px;
  }
  .badge-folder { background: rgba(255,209,102,0.15); color: var(--folder); border: 1px solid rgba(255,209,102,0.3); }
  .badge-file   { background: rgba(6,214,160,0.15);   color: var(--file);   border: 1px solid rgba(6,214,160,0.3); }

  /* List item */
  .list-item {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 10px 14px;
    background: rgba(10,15,30,0.8);
    border: 1px solid var(--border);
    border-radius: 7px;
    cursor: pointer;
    transition: all 0.15s;
    animation: itemIn 0.2s ease both;
  }
  .list-item:hover { border-color: rgba(0,212,255,0.35); background: rgba(0,212,255,0.04); transform: translateX(4px); }
  .list-item.selected { border-color: var(--accent); }
  .list-icon { font-size: 20px; flex-shrink: 0; }
  .list-name { font-size: 13px; flex: 1; }
  .list-meta { font-size: 11px; color: var(--muted); }

  /* Empty state */
  .empty {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    color: var(--muted);
    gap: 10px;
    padding: 40px;
  }
  .empty-icon { font-size: 52px; opacity: 0.4; }
  .empty-txt { font-family: 'Orbitron', monospace; font-size: 11px; letter-spacing: 3px; }

  /* Status bar */
  .statusbar {
    height: 28px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 16px;
    background: var(--panel);
    border-top: 1px solid var(--border);
    font-size: 10px;
    color: var(--muted);
    flex-shrink: 0;
  }
  .status-left { display: flex; gap: 16px; }
  .status-dot { display: inline-block; width: 6px; height: 6px; border-radius: 50%; background: var(--green); margin-right: 4px; box-shadow: 0 0 6px var(--green); animation: pulse 2s infinite; }
  @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.5; } }

  /* Toast */
  .toast {
    position: fixed;
    bottom: 36px;
    left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: rgba(10,15,30,0.95);
    border: 1px solid var(--accent);
    color: var(--accent);
    padding: 10px 20px;
    border-radius: 8px;
    font-size: 12px;
    letter-spacing: 1px;
    opacity: 0;
    transition: all 0.3s;
    pointer-events: none;
    z-index: 9998;
    box-shadow: 0 0 20px rgba(0,212,255,0.2);
    white-space: nowrap;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  /* Context menu */
  .ctx-menu {
    position: fixed;
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 6px;
    z-index: 1000;
    min-width: 150px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.6);
    display: none;
  }
  .ctx-menu.show { display: block; }
  .ctx-item {
    padding: 8px 12px;
    border-radius: 5px;
    font-size: 12px;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 8px;
    transition: background 0.15s;
  }
  .ctx-item:hover { background: rgba(0,212,255,0.08); color: var(--accent); }
  .ctx-item.danger:hover { background: rgba(255,107,53,0.08); color: var(--warn); }
  .ctx-sep { height: 1px; background: var(--border); margin: 4px 0; }

  /* Rename input inline */
  .rename-inp {
    background: rgba(0,212,255,0.08);
    border: 1px solid var(--accent);
    border-radius: 4px;
    color: var(--accent);
    font-family: 'Share Tech Mono', monospace;
    font-size: 11px;
    width: 88px;
    padding: 2px 5px;
    outline: none;
  }
</style>
</head>
<body>

<!-- TOP BAR -->
<div class="topbar">
  <div style="display:flex;align-items:center;gap:14px;">
    <div class="dot-row">
      <div class="dot r"></div>
      <div class="dot y"></div>
      <div class="dot g"></div>
    </div>
    <div class="logo">NEX<span>US</span> <span style="font-size:11px;color:var(--muted);letter-spacing:2px;">FILE SYSTEM</span></div>
  </div>
  <div class="sys-info">
    <div>SYS <span id="clock">--:--:--</span></div>
    <div>VER <span>2.4.1</span></div>
    <div>STATUS <span>ONLINE</span></div>
  </div>
</div>

<div class="layout">

  <!-- SIDEBAR -->
  <div class="sidebar">
    <div class="sidebar-section">
      <div class="sidebar-label">// CONTROLS</div>
      <div class="inp-wrap">
        <input type="text" id="inp-name" placeholder="node name...">
      </div>
      <div class="type-toggle">
        <button class="toggle-btn active-folder" id="btn-folder" onclick="setType('folder')">📂 DIR</button>
        <button class="toggle-btn" id="btn-file" onclick="setType('file')">📄 FILE</button>
      </div>
      <button class="action-btn btn-add" onclick="addItem()">⊕ CREATE NODE</button>
      <button class="action-btn btn-del" onclick="deleteSelected()">⊗ DELETE NODE</button>
      <button class="action-btn btn-back" onclick="goBack()">← PARENT DIR</button>
    </div>

    <div class="sidebar-section" style="padding:12px 16px;">
      <div class="sidebar-label">// QUICK ACCESS</div>
      <div id="quick-access" style="display:flex;flex-direction:column;gap:4px;font-size:12px;color:var(--muted);">
        <!-- filled by JS -->
      </div>
    </div>

    <div class="stats">
      <div class="stat-box">
        <div class="stat-num" id="stat-folders">0</div>
        <div class="stat-lbl">DIRS</div>
      </div>
      <div class="stat-box">
        <div class="stat-num" id="stat-files">0</div>
        <div class="stat-lbl">FILES</div>
      </div>
      <div class="stat-box" style="grid-column:span 2;">
        <div class="stat-num" id="stat-total" style="font-size:14px;">0</div>
        <div class="stat-lbl">TOTAL NODES IN DIR</div>
      </div>
    </div>
  </div>

  <!-- MAIN -->
  <div class="main">

    <!-- Breadcrumb -->
    <div class="breadcrumb" id="breadcrumb"></div>

    <!-- Toolbar -->
    <div class="toolbar">
      <div class="view-info" id="view-info">0 items</div>
      <div class="view-btns">
        <button class="view-btn on" id="vb-grid" onclick="setView('grid')" title="Grid">⊞</button>
        <button class="view-btn"    id="vb-list" onclick="setView('list')" title="List">☰</button>
      </div>
    </div>

    <!-- File area -->
    <div class="grid-wrap" id="grid-wrap" onclick="handleBgClick(event)">
      <div class="grid" id="display"></div>
    </div>

    <!-- Status bar -->
    <div class="statusbar">
      <div class="status-left">
        <div><span class="status-dot"></span>NEXUS EXPLORER</div>
        <div id="sb-path">root/</div>
      </div>
      <div id="sb-sel">NO SELECTION</div>
    </div>
  </div>
</div>

<!-- Context menu -->
<div class="ctx-menu" id="ctx-menu">
  <div class="ctx-item" onclick="ctxOpen()">↳ Open</div>
  <div class="ctx-item" onclick="ctxRename()">✎ Rename</div>
  <div class="ctx-sep"></div>
  <div class="ctx-item danger" onclick="ctxDelete()">⊗ Delete</div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script>
  /* ── DATA ── */
  let root = { name:'root', type:'folder', children:[] };
  let current = root;
  let pathStack = [];
  let selectedItem = null;
  let ctxTarget = null;
  let currentType = 'folder';
  let viewMode = 'grid';

  const FILE_ICONS = {
    folder: '📂',
    default: '📄',
    txt:'📝', md:'📝', doc:'📃', docx:'📃', pdf:'📕',
    jpg:'🖼️', jpeg:'🖼️', png:'🖼️', gif:'🎞️', svg:'🎨',
    mp3:'🎵', wav:'🎵', mp4:'🎬', avi:'🎬',
    zip:'🗜️', rar:'🗜️', tar:'🗜️',
    js:'🟨', ts:'🔷', py:'🐍', html:'🌐', css:'🎨',
    json:'📋', xml:'📋', csv:'📊', xlsx:'📊',
    exe:'⚙️', sh:'💻', bat:'💻',
  };

  function getIcon(item) {
    if (item.type === 'folder') return '📂';
    const ext = item.name.split('.').pop().toLowerCase();
    return FILE_ICONS[ext] || FILE_ICONS.default;
  }

  /* ── CLOCK ── */
  function updateClock() {
    const now = new Date();
    document.getElementById('clock').textContent =
      String(now.getHours()).padStart(2,'0') + ':' +
      String(now.getMinutes()).padStart(2,'0') + ':' +
      String(now.getSeconds()).padStart(2,'0');
  }
  setInterval(updateClock, 1000);
  updateClock();

  /* ── TOAST ── */
  function toast(msg, color) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.style.borderColor = color || 'var(--accent)';
    t.style.color = color || 'var(--accent)';
    t.classList.add('show');
    clearTimeout(t._t);
    t._t = setTimeout(() => t.classList.remove('show'), 2000);
  }

  /* ── TYPE TOGGLE ── */
  function setType(type) {
    currentType = type;
    document.getElementById('btn-folder').className = 'toggle-btn' + (type==='folder' ? ' active-folder':'');
    document.getElementById('btn-file').className   = 'toggle-btn' + (type==='file'   ? ' active-file':'');
  }

  /* ── VIEW MODE ── */
  function setView(mode) {
    viewMode = mode;
    document.getElementById('vb-grid').className = 'view-btn' + (mode==='grid' ? ' on':'');
    document.getElementById('vb-list').className = 'view-btn' + (mode==='list' ? ' on':'');
    render();
  }

  /* ── RENDER ── */
  function render() {
    const display = document.getElementById('display');
    display.className = viewMode === 'grid' ? 'grid' : 'list';
    display.innerHTML = '';

    const items = current.children;

    // Stats
    const dirs  = items.filter(i=>i.type==='folder').length;
    const files = items.filter(i=>i.type==='file').length;
    document.getElementById('stat-folders').textContent = dirs;
    document.getElementById('stat-files').textContent   = files;
    document.getElementById('stat-total').textContent   = items.length;
    document.getElementById('view-info').textContent    = items.length + ' item' + (items.length!==1?'s':'');

    // Breadcrumb
    const bc = document.getElementById('breadcrumb');
    bc.innerHTML = '';
    const crumbs = [root, ...pathStack];
    crumbs.forEach((c, i) => {
      const span = document.createElement('span');
      span.className = 'crumb' + (i===crumbs.length-1 ? ' active':'');
      span.textContent = c.name;
      if (i < crumbs.length-1) span.onclick = () => jumpTo(i);
      bc.appendChild(span);
      if (i < crumbs.length-1) {
        const sep = document.createElement('span');
        sep.className = 'sep'; sep.textContent = '/';
        bc.appendChild(sep);
      }
    });

    // Status bar path
    const pathStr = 'root/' + pathStack.map(p=>p.name).join('/') + (pathStack.length ? '/' : '');
    document.getElementById('sb-path').textContent = pathStr;

    // Quick access (root folders)
    const qa = document.getElementById('quick-access');
    qa.innerHTML = '';
    root.children.filter(i=>i.type==='folder').slice(0,6).forEach(f => {
      const d = document.createElement('div');
      d.style.cssText = 'cursor:pointer;padding:4px 8px;border-radius:4px;transition:background 0.15s;';
      d.textContent = '📂 ' + f.name;
      d.onmouseover = () => d.style.background = 'rgba(0,212,255,0.07)';
      d.onmouseleave = () => d.style.background = '';
      d.onclick = () => { pathStack=[]; current=root; openFolder(f); };
      qa.appendChild(d);
    });
    if (!qa.children.length) qa.innerHTML = '<div style="font-size:11px;opacity:0.5;padding:4px 8px;">no dirs yet</div>';

    // Empty state
    if (items.length === 0) {
      display.innerHTML = `
        <div class="empty" style="width:100%;justify-content:center;align-items:center;flex-direction:column;gap:10px;padding:60px 0;">
          <div class="empty-icon">🌌</div>
          <div class="empty-txt">DIRECTORY EMPTY</div>
          <div style="font-size:11px;color:var(--muted);">create a node using the sidebar</div>
        </div>`;
      return;
    }

    // Sort: folders first
    const sorted = [...items].sort((a,b) => {
      if (a.type===b.type) return a.name.localeCompare(b.name);
      return a.type==='folder' ? -1 : 1;
    });

    sorted.forEach((item, delay) => {
      const el = viewMode==='grid' ? makeGridItem(item, delay) : makeListItem(item, delay);
      display.appendChild(el);
    });
  }

  function makeGridItem(item, delay) {
    const div = document.createElement('div');
    div.className = 'item ' + (item.type==='folder' ? 'folder-item':'file-item') +
                    (selectedItem===item ? ' selected':'');
    div.style.animationDelay = (delay * 30) + 'ms';
    div.innerHTML = `
      <div class="item-type-badge ${item.type==='folder'?'badge-folder':'badge-file'}">${item.type==='folder'?'DIR':'FILE'}</div>
      <span class="item-icon">${getIcon(item)}</span>
      <div class="item-name" id="label-${item._id}">${item.name}</div>`;
    div.onclick = (e) => { e.stopPropagation(); selectItem(item); };
    div.ondblclick = () => { if(item.type==='folder') openFolder(item); };
    div.oncontextmenu = (e) => showCtxMenu(e, item);
    return div;
  }

  function makeListItem(item, delay) {
    const div = document.createElement('div');
    div.className = 'list-item' + (selectedItem===item ? ' selected':'');
    div.style.animationDelay = (delay * 20) + 'ms';
    div.innerHTML = `
      <span class="list-icon">${getIcon(item)}</span>
      <span class="list-name" id="label-${item._id}">${item.name}</span>
      <span class="list-meta">${item.type.toUpperCase()}</span>
      <span class="list-meta">${item.type==='folder'?(item.children.length+' items'):'—'}</span>`;
    div.onclick = (e) => { e.stopPropagation(); selectItem(item); };
    div.ondblclick = () => { if(item.type==='folder') openFolder(item); };
    div.oncontextmenu = (e) => showCtxMenu(e, item);
    return div;
  }

  /* ── SELECTION ── */
  function selectItem(item) {
    selectedItem = item;
    document.getElementById('inp-name').value = item.name;
    document.getElementById('sb-sel').textContent = item.name + ' [' + item.type.toUpperCase() + ']';
    render();
  }

  function handleBgClick(e) {
    if (e.target.id === 'grid-wrap' || e.target.classList.contains('grid') || e.target.classList.contains('list')) {
      selectedItem = null;
      document.getElementById('sb-sel').textContent = 'NO SELECTION';
      render();
    }
    closeCtx();
  }

  /* ── NAVIGATION ── */
  function openFolder(folder) {
    pathStack.push(folder);
    current = folder;
    selectedItem = null;
    render();
  }

  function goBack() {
    if (pathStack.length === 0) { toast('// already at root', 'var(--warn)'); return; }
    pathStack.pop();
    current = pathStack.length === 0 ? root : pathStack[pathStack.length-1];
    selectedItem = null;
    render();
  }

  function jumpTo(index) {
    if (index === 0) { pathStack=[]; current=root; }
    else { pathStack = pathStack.slice(0, index); current = pathStack[pathStack.length-1]; }
    selectedItem = null;
    render();
  }

  /* ── ID util ── */
  let _uid = 0;
  function uid() { return ++_uid; }

  /* ── ADD ── */
  function addItem() {
    let name = document.getElementById('inp-name').value.trim();
    if (!name) { toast('// enter a node name', 'var(--warn)'); return; }
    if (current.children.find(i=>i.name===name)) { toast('// node already exists', 'var(--warn)'); return; }
    const node = { name, type: currentType, _id: uid(), children: currentType==='folder' ? [] : null };
    current.children.push(node);
    document.getElementById('inp-name').value = '';
    toast('// node created: ' + name);
    render();
  }

  /* ── DELETE ── */
  function deleteSelected() {
    if (!selectedItem) { toast('// select a node first', 'var(--warn)'); return; }
    current.children = current.children.filter(i=>i!==selectedItem);
    toast('// deleted: ' + selectedItem.name, 'var(--warn)');
    selectedItem = null;
    document.getElementById('sb-sel').textContent = 'NO SELECTION';
    render();
  }

  /* ── CONTEXT MENU ── */
  function showCtxMenu(e, item) {
    e.preventDefault();
    ctxTarget = item;
    const menu = document.getElementById('ctx-menu');
    menu.style.left = e.clientX + 'px';
    menu.style.top  = e.clientY + 'px';
    menu.classList.add('show');
    // hide open option for files
    menu.children[0].style.display = item.type==='folder' ? '' : 'none';
  }

  function closeCtx() { document.getElementById('ctx-menu').classList.remove('show'); }
  document.addEventListener('click', closeCtx);

  function ctxOpen() {
    if (ctxTarget && ctxTarget.type==='folder') openFolder(ctxTarget);
    closeCtx();
  }

  function ctxRename() {
    if (!ctxTarget) { closeCtx(); return; }
    const newName = prompt('Rename "' + ctxTarget.name + '" to:', ctxTarget.name);
    if (newName && newName.trim() && newName.trim()!==ctxTarget.name) {
      if (current.children.find(i=>i.name===newName.trim()&&i!==ctxTarget)) {
        toast('// name already taken', 'var(--warn)'); closeCtx(); return;
      }
      ctxTarget.name = newName.trim();
      toast('// renamed to: ' + ctxTarget.name);
      render();
    }
    closeCtx();
  }

  function ctxDelete() {
    if (!ctxTarget) { closeCtx(); return; }
    current.children = current.children.filter(i=>i!==ctxTarget);
    toast('// deleted: ' + ctxTarget.name, 'var(--warn)');
    if (selectedItem===ctxTarget) { selectedItem=null; document.getElementById('sb-sel').textContent='NO SELECTION'; }
    ctxTarget = null;
    closeCtx();
    render();
  }

  /* ── KEYBOARD ── */
  document.addEventListener('keydown', e => {
    if (e.key==='Enter' && document.activeElement===document.getElementById('inp-name')) addItem();
    if (e.key==='Delete' && selectedItem) deleteSelected();
    if (e.key==='Backspace' && document.activeElement.tagName!=='INPUT') goBack();
    if (e.key==='Escape') { selectedItem=null; document.getElementById('sb-sel').textContent='NO SELECTION'; render(); }
  });

  /* ── SEED DATA ── */
  function seed() {
    const mkFolder = (name, children=[]) => ({ name, type:'folder', _id:uid(), children });
    const mkFile   = (name) => ({ name, type:'file', _id:uid(), children:null });
    root.children = [
      mkFolder('System', [mkFile('kernel.bin'), mkFile('config.xml'), mkFolder('logs', [mkFile('error.log'), mkFile('access.log')])]),
      mkFolder('Projects', [mkFolder('nexus-ui', [mkFile('index.html'), mkFile('styles.css'), mkFile('app.js')]), mkFolder('data-core', [mkFile('schema.json'), mkFile('migrate.py')])]),
      mkFolder('Media', [mkFile('cover.png'), mkFile('demo.mp4'), mkFile('soundtrack.mp3')]),
      mkFile('README.md'),
      mkFile('manifest.json'),
    ];
  }
  seed();
  render();
</script>
</body>
</html>
